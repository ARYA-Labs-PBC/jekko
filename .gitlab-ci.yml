# GitLab CI/CD — full parity transfer of .github/workflows/*.yml
# Generated by hand from .github/workflows/ (16 workflows). Each `include`
# below maps to one GitHub workflow file. See .gitlab/ci/README.md for the
# parity matrix and notes on GitLab-side differences (no per-job permissions,
# no composite actions — replaced with anchors and `extends`).
#
# Trigger map:
#   on: pull_request                 -> $CI_PIPELINE_SOURCE == "merge_request_event"
#   on: push: branches: [main]       -> $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
#   on: schedule: cron               -> $CI_PIPELINE_SOURCE == "schedule" (cron set in Settings -> CI/CD -> Schedules)
#   on: workflow_dispatch            -> $CI_PIPELINE_SOURCE == "web" or "api"
#   on: release                      -> $CI_COMMIT_TAG && $CI_PIPELINE_SOURCE == "push"
#   on: pull_request_target          -> $CI_PIPELINE_SOURCE == "merge_request_event" (GitLab has no target equivalent; permission model is project-side)

stages:
  - static
  - test
  - audit
  - generate
  - deploy
  - scheduled

variables:
  # Shallow clone for fast jobs; jobs that need git history (jankurai, security trufflehog)
  # override with GIT_DEPTH: 0 at the job level.
  GIT_DEPTH: "20"
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"
  # Match GitHub workflow env. Per-job env in `variables:` blocks below.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

default:
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - scheduler_failure

# Workflow-level rules: do NOT create double pipelines for the same commit when
# both a branch push and a merge request exist.
workflow:
  rules:
    # Tag-driven pipelines (releases) always run
    - if: $CI_COMMIT_TAG
    # Merge requests always run
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Scheduled pipelines always run
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Manual / web / API pipelines always run
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
    # Branch pushes only when there is no open MR for the same branch
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null

include:
  - local: .gitlab/ci/_shared.yml
  - local: .gitlab/ci/static.yml
  - local: .gitlab/ci/test.yml
  - local: .gitlab/ci/parity.yml
  - local: .gitlab/ci/security.yml
  - local: .gitlab/ci/jankurai.yml
  - local: .gitlab/ci/nix.yml
  - local: .gitlab/ci/generate.yml
  - local: .gitlab/ci/deploy.yml
  - local: .gitlab/ci/notify.yml
  - local: .gitlab/ci/pr-standards.yml
  - local: .gitlab/ci/scheduled.yml
