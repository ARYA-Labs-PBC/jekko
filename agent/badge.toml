# Jekko README badge auto-update configuration.
# When present, `jankurai audit` refreshes the badge artifacts after writing
# the current audit report. Set `enabled = false` to disable.

enabled = true
score = "agent/repo-score.json"
svg = "agent/jankurai-badge.svg"
json = "agent/jankurai-badge.json"
readme = "README.md"
# Point README at the committed ratchet baseline (the actual score report
# this badge summarises). Same pattern the upstream jankurai repo uses.
# GitHub renders the file natively as JSON; clicking the badge surfaces the
# full audit input for the displayed score.
link = "agent/baselines/main.repo-score.json"
update_readme = true
label = "jankurai"
