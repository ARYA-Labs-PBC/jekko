# Jekko README badge auto-update configuration.
# When present, `jankurai audit` refreshes the badge artifacts after writing
# the current audit report. Set `enabled = false` to disable.

enabled = true
score = "agent/repo-score.json"
svg = "agent/jankurai-badge.svg"
json = "agent/jankurai-badge.json"
readme = "README.md"
# Point README at the GitHub file page so clicks resolve to a stable page,
# while the image still renders from the committed artifact.
link = "https://github.com/neverhuman/jekko/blob/main/agent/jankurai-badge.svg"
update_readme = true
label = "jankurai"
