schema_version = "1.0.0"

[[tools]]
artifact_paths = [
    "agent/repo-score.json",
    "agent/repo-score.md",
    "target/jankurai/repo-score.json",
    "target/jankurai/repo-score.md",
    "target/jankurai/jankurai.sarif",
    "target/jankurai/summary.md",
    "target/jankurai/repair-queue.jsonl",
]
ci_command = "jankurai audit . --mode ratchet --baseline agent/baselines/main.repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl"
id = "audit-ci"
local_command = "jankurai audit . --mode ratchet --baseline agent/baselines/main.repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/proof-plan.json",
    "target/jankurai/proof-plan.md",
]
ci_command = "jankurai proof . --changed-from origin/main --out target/jankurai/proof-plan.json --md target/jankurai/proof-plan.md"
id = "proof-routing"
local_command = "jankurai proof . --changed-from origin/main --out target/jankurai/proof-plan.json --md target/jankurai/proof-plan.md"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/proofbind/surface-witness.json",
    "target/jankurai/proofbind/obligations.json",
    "target/jankurai/proofbind/proofbind.md",
    "target/jankurai/proof-receipts/agent-tool-supply.json",
]
ci_command = "jankurai proofbind verify . --changed-from origin/main --proof-receipts target/jankurai/proof-receipts --out target/jankurai/proofbind/surface-witness.json --obligations-out target/jankurai/proofbind/obligations.json --md target/jankurai/proofbind/proofbind.md"
id = "proofbind"
local_command = "jankurai proofbind verify . --changed-from origin/main --proof-receipts target/jankurai/proof-receipts --out target/jankurai/proofbind/surface-witness.json --obligations-out target/jankurai/proofbind/obligations.json --md target/jankurai/proofbind/proofbind.md"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/proofmark/proofmark-receipt.json",
    "target/jankurai/proofmark/proof-receipt.json",
]
ci_command = "jankurai proofmark rust . --obligations target/jankurai/proofbind/obligations.json"
id = "proofmark-rust"
local_command = "jankurai proofmark rust . --obligations target/jankurai/proofbind/obligations.json"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/copy-code.json",
    "target/jankurai/copy-code.md",
]
ci_command = "jankurai copy-code . --json target/jankurai/copy-code.json --md target/jankurai/copy-code.md"
id = "copy-code"
local_command = "jankurai copy-code . --json target/jankurai/copy-code.json --md target/jankurai/copy-code.md"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/security/evidence.json",
    "target/jankurai/security/gitleaks.json",
    "target/jankurai/security/cargo-audit.json",
    "target/jankurai/security/zizmor.json",
    "target/jankurai/security/sbom.spdx.json",
    "target/jankurai/security/lane-status.txt",
]
ci_command = "cargo run -p xtask --locked -- security-lane --profile ci --out target/jankurai/security"
id = "security"
local_command = "cargo run -p xtask --locked -- security-lane --out target/jankurai/security"
mode = "auto"

[[tools]]
artifact_paths = [
    "target/jankurai/language-bad-behavior.json",
    "target/jankurai/language-bad-behavior.md",
]
ci_command = "jankurai audit . --mode advisory --changed-fast --changed-from origin/main --json target/jankurai/language-bad-behavior.json --md target/jankurai/language-bad-behavior.md"
id = "ci-bad-behavior"
local_command = "jankurai audit . --mode advisory --changed-fast --changed-from origin/main --json target/jankurai/language-bad-behavior.json --md target/jankurai/language-bad-behavior.md"
mode = "auto"

