schema_version = "1.0.0"

[[tools]]
artifact_paths = [
    ".jankurai/repo-score.json",
    ".jankurai/repo-score.md",
    ".jankurai/jankurai.sarif",
    ".jankurai/summary.md",
    ".jankurai/repair-queue.jsonl",
]
ci_command = "jankurai audit . --mode ratchet --baseline agent/baselines/main.repo-score.json --json .jankurai/repo-score.json --md .jankurai/repo-score.md --sarif .jankurai/jankurai.sarif --github-step-summary .jankurai/summary.md --repair-queue-jsonl .jankurai/repair-queue.jsonl"
id = "audit-ci"
local_command = "jankurai audit . --mode ratchet --baseline agent/baselines/main.repo-score.json --json .jankurai/repo-score.json --md .jankurai/repo-score.md --sarif .jankurai/jankurai.sarif --github-step-summary .jankurai/summary.md --repair-queue-jsonl .jankurai/repair-queue.jsonl"
mode = "auto"

[[tools]]
artifact_paths = [
    ".jankurai/proof-plan.json",
    ".jankurai/proof-plan.md",
]
ci_command = "jankurai proof . --changed-from origin/main --out .jankurai/proof-plan.json --md .jankurai/proof-plan.md"
id = "proof-routing"
local_command = "jankurai proof . --changed-from origin/main --out .jankurai/proof-plan.json --md .jankurai/proof-plan.md"
mode = "auto"

[[tools]]
artifact_paths = [
    ".jankurai/proofbind/surface-witness.json",
    ".jankurai/proofbind/obligations.json",
    ".jankurai/proofbind/proofbind.md",
    ".jankurai/proof-receipts/agent-tool-supply.json",
]
ci_command = "jankurai proofbind verify . --changed-from origin/main --proof-receipts .jankurai/proof-receipts --out .jankurai/proofbind/surface-witness.json --obligations-out .jankurai/proofbind/obligations.json --md .jankurai/proofbind/proofbind.md"
id = "proofbind"
local_command = "jankurai proofbind verify . --changed-from origin/main --proof-receipts .jankurai/proof-receipts --out .jankurai/proofbind/surface-witness.json --obligations-out .jankurai/proofbind/obligations.json --md .jankurai/proofbind/proofbind.md"
mode = "auto"

[[tools]]
artifact_paths = [
    ".jankurai/proofmark/proofmark-receipt.json",
    ".jankurai/proofmark/proof-receipt.json",
]
ci_command = "jankurai proofmark rust . --obligations .jankurai/proofbind/obligations.json"
id = "proofmark-rust"
local_command = "jankurai proofmark rust . --obligations .jankurai/proofbind/obligations.json"
mode = "auto"

[[tools]]
artifact_paths = [
    ".jankurai/copy-code.json",
    ".jankurai/copy-code.md",
]
ci_command = "jankurai copy-code . --json .jankurai/copy-code.json --md .jankurai/copy-code.md"
id = "copy-code"
local_command = "jankurai copy-code . --json .jankurai/copy-code.json --md .jankurai/copy-code.md"
mode = "auto"

[[tools]]
artifact_paths = [
    ".jankurai/security/evidence.json",
    ".jankurai/security/gitleaks.json",
    ".jankurai/security/cargo-audit.json",
    ".jankurai/security/zizmor.json",
    ".jankurai/security/sbom.spdx.json",
    ".jankurai/security/lane-status.txt",
]
ci_command = "cargo run -p xtask --locked -- security-lane --profile ci --out .jankurai/security"
id = "security"
local_command = "cargo run -p xtask --locked -- security-lane --out .jankurai/security"
mode = "auto"

[[tools]]
artifact_paths = [
    ".jankurai/language-bad-behavior.json",
