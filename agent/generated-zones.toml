[[zone]]
command = "cargo run -p zyalc --manifest-path crates/zyalc/Cargo.toml -- compile agent/zyal/sandbox-lanes.zyal --out agent/sandbox-lanes.toml"
path = "agent/sandbox-lanes.toml"
read_only = true
source = "zyalc"

[[zone]]
path = "agent/jankurai-badge.svg"
command = "jankurai audit . --mode ratchet --full --baseline agent/baselines/main.repo-score.json --json agent/repo-score.json --md agent/repo-score.md --no-score-history"
source = "agent/badge.toml"
read_only = false
write_policy = "auditor_output"

[[zone]]
path = "agent/jankurai-badge.json"
command = "jankurai audit . --mode ratchet --full --baseline agent/baselines/main.repo-score.json --json agent/repo-score.json --md agent/repo-score.md --no-score-history"
source = "agent/badge.toml"
read_only = false
write_policy = "auditor_output"
