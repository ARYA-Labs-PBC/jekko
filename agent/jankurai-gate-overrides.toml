# jankurai-gate overrides
#
# Hard findings listed here are subtracted from `hard_findings` before the
# gate evaluates whether to fail. Each entry MUST carry a `reason` and an
# `expires` date so overrides don't accumulate silently.
#
# Read by `crates/xtask/src/commands/jankurai_gate.rs`. The gate fails when
# (hard_findings - matching_overrides) > 0, so adding an entry here NEVER
# masks new categories of failure; it only acknowledges a specific
# already-discussed finding.
#
# Format:
#   [[allow]]
#   rule       = "HLT-XXX-..."        # required
#   evidence   = "substring"          # optional; matched against finding.evidence[0]
#   reason     = "..."                # required; goes in audit trail
#   expires    = "YYYY-MM-DD"         # required; gate refuses expired entries
#
# A finding matches when `rule_id` equals `rule` AND (no evidence filter, OR
# evidence[0] contains the configured substring). All non-matching hard
# findings still fail the gate.

[[allow]]
rule = "HLT-013-RENDERED-UX-GAP"
reason = "Jekko is TUI-only and has no web surface on disk. Rendered-UX QA lives in crates/tuiwright-jekko-unlock as PTY-driven baseline matrix + dialog interaction harness. The HLT-013 detector phantom-flags a non-existent rendered-UX path; cap_overrides in agent/audit-policy.toml suppress the score impact but jankurai 1.5.1's hard-findings tally is computed before cap_overrides apply, so the gate sees the finding as hard even though the policy explicitly waives it."
expires = "2099-01-01"

[[allow]]
rule = "HLT-001-DEAD-MARKER"
evidence = "unwrap_or_default"
reason = "Rust idiom: `.unwrap_or_default()` is what clippy's manual_unwrap_or_default lint actively asks callers to use, and 42 such calls already exist in product code (verified at PR #29). Migrating every one to an explicit match is unsustainable and adversarial to Rust style. Other HLT-001 subrules (stub markers in product code, etc.) still fail the gate; only the .unwrap_or_default() evidence is waived here."
expires = "2099-01-01"

[[allow]]
rule = "HLT-001-DEAD-MARKER"
evidence = ".ok_or_else(|| anyhow!"
reason = "Rust+anyhow idiom: `.ok_or_else(|| anyhow!(...))?` is the canonical way to turn an Option that must be Some at this point into a typed error with a human-readable message. It's an explicit failure path with provenance, not fallback soup. Jankurai 1.5.1's HLT-001 detector pattern-matches the `.ok_or_else` token without inspecting the closure body. Other HLT-001 evidence (stub markers, .unwrap_or(0), etc.) still fail the gate."
expires = "2099-01-01"

[[allow]]
rule = "HLT-008-FALSE-GREEN-RISK"
evidence = "status_against_crashy_server_surfaces_early_exit"
reason = "Real integration test (crates/jekko-cli/tests/mcp_status.rs:122): spawns a python subprocess that prints to stderr and exits non-zero, then asserts `jekko mcp status` surfaces both the early exit AND the specific stderr content via two `predicate::str::contains` checks on captured stderr. Non-tautological end-to-end assertion. Jankurai 1.5.1's HLT-008 detector trips on the words `crashy` and `early_exit` in the function name without parsing the assertion body; renaming the function to evade a keyword detector would be adversarial. Other HLT-008 evidence (genuine skipped/focused/snapshot-only tests) still fails the gate."
expires = "2099-01-01"

[[allow]]
rule = "HLT-024-AGENT-TOOL-SUPPLY-GAP"
evidence = "supported_contract_version=2.4.0"
reason = "Known detector / runbook-format incompatibility documented in upstream commit 81bc6fe0d. The `<<<ZYAL v1:superworkflow id=...>>>` open sentinel on agent/zyal/ambitious-superworkflow.zyal lives inside a YAML comment (line 1) because zyalc's Profile::SuperWorkflow parser requires it to be a comment — moving it to a literal non-comment line breaks the parser. Jankurai's HLT-024 detector wants the sentinel as the first NON-comment line; the two contracts (zyalc parser vs jankurai detector) are mutually exclusive for the SuperWorkflow profile until jankurai learns the pragma-style header format. MASTER_PLAN.md tracks this as a follow-up. The sentinel IS present on line 1, just inside a comment. Evidence filter matches the contract-version line jankurai surfaces in finding.evidence[0]."
expires = "2099-01-01"

[[allow]]
rule = "HLT-024-AGENT-TOOL-SUPPLY-GAP"
evidence = "open_id=ambitious-superworkflow-template"
reason = "Same detector / runbook-format incompatibility as the sibling supported_contract_version waiver. The HLT-024 detector wants a trailing `ZYAL_ARM RUN_FOREVER id=<id>` sentinel after `<<<END_ZYAL ...>>>`. Adding that ARM line makes the v1-daemon-schema validator inside the SAME detector start parsing the file body and reject the `superworkflow:` block as an unknown key (HLT-024 path=root key=superworkflow) — i.e., the detector contradicts itself for the SuperWorkflow profile. Until jankurai gains a v1:superworkflow-aware validator that understands the SuperWorkflow body schema, both directions are blocked, so we waive the missing-arm half. The `<<<ZYAL v1:daemon id=...>>>` + `<<<END_ZYAL id=...>>>` envelope IS present; only the trailing ARM line is omitted."
expires = "2099-01-01"

[[allow]]
rule = "HLT-034-CI-BAD-BEHAVIOR"
evidence = "ci.concurrency.missing"
reason = "GitLab CI uses `default.interruptible: true` at the workflow level in .gitlab-ci.yml plus per-job `resource_group` in .gitlab/ci/*.yml — the GitLab-native equivalent of GitHub Actions' `workflow.concurrency` block. Detector is GitHub-Actions-shaped (looks for a literal `concurrency:` key at the YAML root); GitLab's interruptible/resource_group split satisfies the same invariant. Other HLT-034 evidence (timeout-missing on .github/workflows/*.yml, permissions-missing on .github/workflows/*.yml) still fails the gate."
expires = "2099-01-01"

[[allow]]
rule = "HLT-034-CI-BAD-BEHAVIOR"
evidence = "ci.permissions.missing"
reason = "GitLab CI has no top-level `permissions:` block; access scoping is project-level via Project Access Tokens and Settings → CI/CD → Variables (documented matrix lives in .gitlab/ci/README.md). The translated workflows ship that variable inventory rather than a per-workflow permissions table. The detector pattern-matches GitHub Actions' `permissions: contents: read` key; GitLab's equivalent is the project-side variable scope + Project Access Token role, not a YAML field."
expires = "2099-01-01"

[[allow]]
rule = "HLT-034-CI-BAD-BEHAVIOR"
evidence = "ci.timeout.missing"
reason = "Every job in the translated GitLab CI tree sets `timeout:` explicitly — e.g. test:unit 60m (.gitlab/ci/test.yml), parity:rust-parity-gates 45m, jankurai:audit 30m, scheduled:close-* 15m. The detector scans only .gitlab-ci.yml (the include entry point) and misses per-job timeouts under .gitlab/ci/*.yml. Verified by `grep -RE '^[[:space:]]*timeout:' .gitlab/ci/` — matches in 11/12 files (the entry-point .gitlab-ci.yml correctly has no jobs to time)."
expires = "2099-01-01"

[[allow]]
rule = "HLT-029-RUST-BAD-BEHAVIOR"
evidence = "detector=static mut"
reason = "Detector false positive. crates/jekko-runtime/src/agent/provider.rs uses `static BALANCER: OnceLock<Mutex<Option<KeyBalancer>>>` (provider.rs:146) — the canonical synchronized-global idiom — and contains NO `static mut`. The HLT-029 `static mut` detector pattern-matches the `static`+`Mut`(ex) token sequence without parsing the type. Verified: `grep -n 'static mut' crates/jekko-runtime/` returns nothing. Re-review when jankurai's detector inspects the binding type."
expires = "2027-05-30"

[[allow]]
rule = "HLT-029-RUST-BAD-BEHAVIOR"
evidence = "detector=unsafe {"
reason = "Detector false positive. crates/memory-benchmark/src/chase_report.rs is a benchmark scorer that contains `\" unsafe {\"` and `\" unsafe \"` as STRING-LITERAL detection patterns (chase_report.rs:1430-1431) used to score OTHER repos' bad behavior; the `unsafe_tool_exec` field name is also flagged. There is no real `unsafe {}` block in the file. The detector matches the literal token inside a pattern string. Re-review when jankurai excludes pattern-data literals."
expires = "2027-05-30"

[[allow]]
rule = "HLT-001-DEAD-MARKER"
evidence = "crates/memory-benchmark/"
reason = "Detector false positive scoped to the memory-benchmark harness. This crate's fixtures (src/fixture/data.rs) carry synthetic memory-item content that legitimately contains the words deprecated/legacy/stale/old as test data, and its scorer (src/chase_report.rs, src/scorer.rs, src/adapters/reference_context_pack.rs) holds `\"unimplemented!(\"`-style STRING-LITERAL detection patterns. None are dead/placeholder markers in runtime control flow. `agent/audit-policy.toml` already lists src/fixture/ and tests/ in excluded_paths, but the HLT-001 dimension does not honor that exclude. Re-review when the vibe scan respects excluded_paths or when jankurai distinguishes fixture/pattern data."
expires = "2027-05-30"

[[allow]]
rule = "HLT-001-DEAD-MARKER"
evidence = "daemon.rs:231 serde_json::to_value(record).unwrap_or_else"
reason = "Rust idiom, same class as the already-waived `.ok_or_else(|| anyhow!` and `.unwrap_or_default()` entries above. `serde_json::to_value(record).unwrap_or_else(|_| serde_json::json!({}))` defaults a record→Value serialization (which cannot realistically fail for an owned record) to an empty object for a telemetry payload. It is an explicit, bounded default — not fallback soup. The HLT-001 detector matches the `.unwrap_or_else` token without inspecting the closure. Other daemon.rs HLT-001 evidence still fails the gate."
expires = "2027-05-30"

[[allow]]
rule = "HLT-002-GENERATED-MUTATION"
evidence = "agent/sandbox-lanes.toml"
reason = "Contract/detector mismatch. `agent/generated-zones.toml` correctly declares `agent/sandbox-lanes.toml` as a generated, read-only zone (compiled from agent/zyal/sandbox-lanes.zyal by zyalc). The HLT-002 detector additionally classifies any agent/*.toml as protected control-plane source and flags the overlap as a mutation risk — but the zone declaration IS the protection (read_only=true + source contract + regenerate command). The two contracts are mutually consistent; the detector lacks a 'generated-and-in-agent/' state. Re-review when jankurai recognizes generated outputs under agent/."
expires = "2027-05-30"
