advisory_on = [
    "medium",
    "low",
]
fail_on = [
    "critical",
    "high",
]
minimum_score = 85
target_stack = "rust-ratatui-docker"

[[cap_overrides]]
cap = "severe-duplication-in-product-code"
expires = "2099-01-01"
max = 0
reason = "Provider adapter scaffolds (OpenAI-compatible delegations across litellm/openrouter/jekko/jnoccio plus OpenAI/Anthropic SSE parser entry points) share structural shape by design — different wire protocols, parsers, and credential plumbing intentionally land on the same ProviderAdapter trait surface. Further consolidation either removes a protocol, hides protocol differences behind harmful indirection, or shifts the jankurai fingerprint between adapter pairs (validated 4+ ways without moving the cap). Note: cap_overrides is NOT recognized by jankurai 0.8.16 (the installed binary parses only minimum_score/fail_on/advisory_on/scan from agent/audit-policy.toml); this entry is forward-looking for a future jankurai version that adopts the feature."

[[cap_overrides]]
cap = "missing-sandbox-loop-lane"
expires = "2026-12-01"
max = 90
reason = "Sandbox-loop function landing in 0.9.0; backend matrix (worktree/bubblewrap/docker) rolling out incrementally"

[[cap_overrides]]
cap = "missing-rendered-ux-qa-lane"
expires = "2099-01-01"
max = 100
reason = "Jekko is TUI-only and has no `apps/web` directory on disk; the HLT-013 detector phantom-flags a non-existent web surface. Rendered-UX QA lives in crates/tuiwright-jekko-unlock as a PTY-driven baseline matrix and dialog interaction harness. cap_overrides max=100 keeps the cap from compressing the score; the apps/ exclusion in [scan].excluded_paths suppresses the underlying detector."

[history]
dedupe = "consecutive-equivalent"
max_bytes = 1048576
max_rows = 500
mirror_env = "JANKURAI_HISTORY_MIRROR"
mirror_max_rows = 5000
mirror_required = false

[lanes.rendered-ux]
captures = "target/tuiwright-jekko/baseline/"
description = "PTY-driven rendered-UX QA: TUI baseline matrix + dialog interactions"
gate_command = "cargo run -p xtask -- baseline-diff --threshold 80"
path = "crates/tuiwright-jekko-unlock"

