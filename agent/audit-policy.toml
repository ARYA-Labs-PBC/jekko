    # sentinel-wrapped runbook (`<<<ZYAL v1:daemon …>>>`). Our `sandbox-lanes.zyal`
    # is a Profile B declarative source (pragma-driven, compiles to TOML) and
    # cannot adopt the runbook envelope without breaking the compiler. Excluded
    # until upstream HLT-024 distinguishes Profile A vs Profile B.
    "agent/zyal/sandbox-lanes.zyal",
    # `packages/jekko/src/cli/cmd/tui/feature-plugins/sidebar/zyal/` is a TUI
    # sidebar plugin rendering the `<<<ZYAL>>>` chip — the directory shares the
    # word "zyal" but is product UI code, not a canonical ZYAL repository root.
    # HLT-024 mis-fires on the directory name.
    "packages/jekko/src/cli/cmd/tui/feature-plugins/sidebar/zyal/",
    # `crates/jekko-tui/src/feature_plugins/zyal/` is the Rust port of the same
    # TUI panel split out of the original `zyal.rs` file into per-concern
