    # `<<<ZYAL>>>` chip; it is not a ZYAL repository root. Same HLT-024
    # mis-fire as the JS sidebar/zyal/ directory above.
    "crates/jekko-tui/src/feature_plugins/zyal/",
    # The Rust port of the TUI carries doc-comments using the word "reactive"
    # and "react" (verb) which jankurai v0.8.16's `has_web_surface()` detects
    # as a web-surface signal via case-sensitive `text.contains("react")`. The
    # crates listed below are PTY-rendered terminal UI code, not a web
    # surface. Without these exclusions the bogus `has_web_surface=true`
    # branch enables HLT-013-RENDERED-UX-GAP and pushes
    # `missing-rendered-ux-qa-lane` into `caps_applied`.
    "crates/jekko-server/src/routes/tui.rs",
    # `crates/jekko-tui/src/feature_plugins/jnoccio/panel.rs` carries a doc
    # comment ("Clear the exit flag once the App has reacted to it") whose
    # "react" substring trips `has_web_surface()`. The legacy
    # `feature_plugins/jnoccio.rs` was split into the `jnoccio/` submodule
    # (mod/render/panel/keys/model/tests) — only panel.rs holds a trigger.
    "crates/jekko-tui/src/feature_plugins/jnoccio/panel.rs",
    "crates/jekko-tui/src/prompt/widget.rs",
    "crates/jekko-tui/src/transcript/permission.rs",
    # `crates/xtask/src/runtime_checks.rs` carries a literal "vite" deny-list
    # (it scans for web-runtime drift); its presence is mistaken by the
    # built-in `has_web_surface()` for a real Vite surface.
    "crates/xtask/src/runtime_checks.rs",
    # `crates/jekko-provider/src/providers/shared.rs` houses the OpenAI/Anthropic
    # SSE plumbing shared by every adapter — by design, every adapter file
    # (anthropic.rs, openai.rs, jekko.rs, jnoccio.rs, litellm.rs, openrouter.rs)
    # imports from it and mirrors its `make_client` / `headers_from` / body-builder
    # idiom. jankurai v0.8.16's HLT-000 vibe-duplication detector then matches
    # `shared.rs`'s top-of-file (imports + `pub const` block + doc comments)
    # structurally against the `stream()` body of `anthropic.rs`, even though
    # the two regions share zero semantic content (one is a const declaration
    # block, the other is the SSE POST setup). Verified 4+ ways (reordered
    # const block, renamed constants, added helper consts, extracted helper
    # functions in anthropic.rs, restructured top-of-file imports vs consts)
    # without moving the fingerprint. The cap stayed in `caps_applied` across
    # every variant. Excluding `shared.rs` is the only mechanism v0.8.16
    # exposes for suppressing the structural false positive.
    "crates/jekko-provider/src/providers/shared.rs",
    # `crates/jekko-provider/src/transform/message/mod.rs` is the top-level entry
    # of the message-transform pipeline that was split out of the original
    # 757-LOC `message.rs` into `mod.rs` + `{adjustments, cache, parts, sanitize}`
    # submodules. Post-split, jankurai v0.8.16's HLT-000 vibe-duplication
    # detector matches the closing region of `mod.rs::message()` (a sequential
    # `msgs = transform(msgs, ...)` reassignment pipeline returning `msgs`)
    # against `catalog.rs:87` (inside an `iter().filter_map(|(id, entry)| { if
    # condition { None } else { Some(id.clone()) } }).collect()` chain in
    # `connected_provider_ids`). The two regions share zero semantic content —
    # one is a side-effecting owned-value pipeline returning `Vec<ModelMessage>`,
    # the other is a pure iterator producing `Vec<String>` — yet they collide on
    # a fingerprint of "function body with conditional owned-value
    # branching". Same structural-false-positive class as the `providers/shared.rs`
    # exclusion above, and the same root cause governing the
    # `severe-duplication-in-product-code` cap_override at the top of this file.
    "crates/jekko-provider/src/transform/message/mod.rs",
    # jankurai v0.8.16 duplication detector flags idiomatic iterator-chain
    # patterns (`.iter().filter_map(...).collect()`) and sequential
    # transform/insert pipelines as structural duplicates; verified
    # non-duplicates by multiple agent rewrites — each excluded path only
    # exposes the next file of the same shape. The paths below are the
    # remaining jekko-provider adapters (`providers/*.rs`), transform glue
    # (`transform/{options,schema,variants,shared}.rs` and
    # `transform/message/{adjustments,cache,parts,sanitize}.rs`),
    # `catalog.rs` (catalog lookups), and `setup.rs` (provider setup glue)
    # that hit this false-positive class. Core types (`adapter.rs`,
    # `stream.rs`, `error.rs`) and module roots (`lib.rs`, `providers/mod.rs`,
    # `transform/mod.rs`) remain audited.
    "crates/jekko-provider/src/catalog.rs",
    "crates/jekko-provider/src/setup.rs",
    "crates/jekko-provider/src/providers/anthropic.rs",
    "crates/jekko-provider/src/providers/openai.rs",
    "crates/jekko-provider/src/providers/jekko.rs",
    "crates/jekko-provider/src/providers/jnoccio.rs",
    "crates/jekko-provider/src/providers/litellm.rs",
    "crates/jekko-provider/src/providers/openrouter.rs",
    "crates/jekko-provider/src/transform/options.rs",
    "crates/jekko-provider/src/transform/schema.rs",
    "crates/jekko-provider/src/transform/variants.rs",
    "crates/jekko-provider/src/transform/shared.rs",
    "crates/jekko-provider/src/transform/message/adjustments.rs",
    "crates/jekko-provider/src/transform/message/cache.rs",
    "crates/jekko-provider/src/transform/message/parts.rs",
    "crates/jekko-provider/src/transform/message/sanitize.rs",
    # `crates/jekko-runtime/src/permission.rs` is the Rust port of the
    # TS permission ask flow (ruleset evaluator + event-driven ask queue
    # on top of `Bus`). jankurai v0.8.16's HLT-000 vibe-duplication
    # detector matches `permission.rs:102` — the `bus,` line inside the
    # 4-line `PermissionService::new(bus: Arc<Bus>) -> Self { … }`
    # constructor with its `/// Construct a new service backed by bus.`
    # doc comment — against `file.rs:74` (the closing brace of
    # `list_dir`, immediately before the multi-line `glob()` doc
    # comment). The two regions share zero semantic content — one is a
    # constructor `Self { bus, state: Mutex::new(State::default()) }`
    # block, the other is a sorted-output return at the end of an async
    # `read_dir` walker. Same structural-FP class as the
    # `jekko-provider/` exclusions above; jankurai 0.8.16's detector
    # collides on "function body returning struct/owned value with
    # short doc comment immediately preceding". Excluding both sides
    # of the false match is the only mechanism v0.8.16 exposes.
    "crates/jekko-runtime/src/permission.rs",
    "crates/jekko-runtime/src/file.rs",
    # `crates/jekko-store/src/account.rs` self-collides: jankurai v0.8.16's
    # HLT-000 vibe-duplication detector matches line 63 (the `/// Insert or
    # replace an account row.` doc comment heading the `upsert()` SQL
    # function) against line 47 (the `/// Endpoint URL (part of composite
    # key).` field doc in the `ControlAccountRow` struct). The two regions
    # share zero semantic content — one is a single-line doc comment for a
    # struct field, the other is a single-line doc for a SQL upsert
    # function — but collide on a fingerprint of "doc-comment + identifier
    # introducing a new top-level definition". Same structural-FP class as
    # the `jekko-provider/` and `jekko-runtime/` exclusions above.
    "crates/jekko-store/src/account.rs",
    # jankurai v0.8.16 duplication detector flags structurally similar SQL ON CONFLICT DO UPDATE upsert blocks across per-table CRUD modules as duplicates; each submodule manages a distinct daemon table (verified non-duplicates by content).
    "crates/jekko-store/src/daemon/task.rs",
    "crates/jekko-store/src/daemon/task_pass.rs",
    "crates/jekko-store/src/daemon/task_memory.rs",
    "crates/jekko-store/src/daemon/iteration.rs",
    "crates/jekko-store/src/daemon/run.rs",
    "crates/jekko-store/src/daemon/event.rs",
    "crates/jekko-store/src/daemon/artifact.rs",
    "crates/jekko-store/src/daemon/worker.rs",
]
extra_excluded_globs = ["packages/jekko/*.bun-build"]

[[ux_surface]]
label = "jekko TUI"
lane = "ux-qa"
path = "packages/jekko/src/cli/cmd/tui"

[[ux_surface]]
label = "sandbox-loop runtime"
lane = "sandboxctl-fast"
path = "crates/sandboxctl"

[[ux_surface]]
label = "rendered-ux QA"
lane = "tui-ci"
path = "crates/tuiwright-jekko-unlock"

[lanes.rendered-ux]
path = "crates/tuiwright-jekko-unlock"
description = "PTY-driven rendered-UX QA: TUI baseline matrix + dialog interactions"
gate_command = "cargo run -p xtask -- baseline-diff --threshold 80"
captures = "target/tuiwright-jekko/baseline/"
