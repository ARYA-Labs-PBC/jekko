[autonomy]
# Operations the agent MUST NOT initiate without explicit per-session user
# instruction. See ARYA-Labs-PBC/QantmOrchstrtr-RSI ARY-2292 (E4a) for the
# cross-repo source-of-truth; ARY-2293 (E4b) adds runtime enforcement via
# the Safety Kernel `autonomous_action.*` policy type and ARY-2294 (E4c)
# adds time-based enforcement via the policy sidecar session budget.
max_actions_before_checkpoint = 20
prohibited_autonomous_actions = [
    "launch_training_run",
    "synthesize_atoms",
    "push_to_hf_or_gcs",
    "create_or_resize_vm",
    "run_gp_search",
    "modify_atoms_bundled",
    "run_multi_hour_experiment",
]
require_explicit_confirmation_for = [
    "merge_pr",
    "push_to_main",
    "create_release",
    "delete_branch",
    "force_push",
]
session_checkpoint_interval_minutes = 30

[db]
constraint_paths = ["db/constraints"]
migration_paths = ["db/migrations"]
root_paths = ["db"]

[python]
allowed_truth_paths = ["python/ai-service"]

[queues]
adapter_paths = [
    "crates/adapters/queues",
    "crates/adapters/src/queues",
]
client_markers = [
    "rdkafka",
    "kafkajs",
    "tansu",
    "iggy",
    "fluvio",
    "nats",
    "redis streams",
]
event_contract_paths = ["contracts/events"]
generated_type_paths = ["contracts/generated"]

[rust]
domain_paths = [
    "crates/domain",
    "crates/*/src/domain",
]
forbidden_domain_imports = [
    "std::fs",
    "std::env",
    "std::net",
    "std::time::SystemTime",
    "rand::",
    "sqlx::",
    "diesel::",
    "reqwest::",
    "rdkafka::",
    "tracing::",
    "log::",
]

[stack]
id = "rust-ts-postgres-bounded-python"
version = "0.4.0"

[[streaming_exception]]
classification = "brownfield"
expires = "2026-12-31"
migration_path = "Keep Kafka behind generated event contracts and observable Rust queue adapters; evaluate Tansu, Apache Iggy, and Fluvio with replay, compatibility, and operations proof before replacement."
owner = "platform"
runtime = "kafka"

[typescript]
forbidden_web_imports = [
    "sqlx",
    "pg",
    "postgres",
    "mysql",
    "better-sqlite3",
    "@aws-sdk/client-s3",
]
generated_contract_paths = ["contracts/generated"]
web_paths = []
