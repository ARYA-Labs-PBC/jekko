name: duplicate-issues

on:
  issues:
    types: [opened, edited]

concurrency:
  group: duplicate-issues-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-duplicates:
    if: github.repository == 'neverhuman/jekko' && vars.JEKKO_AUTOMATION_ENABLED == '1' && github.event.action == 'opened'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun

      - name: Check duplicates and compliance
        env:
          JEKKO_API_KEY: ${{ secrets.JEKKO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JEKKO_PERMISSION: |
            {
              "bash": {
                "*": "deny",
                "gh issue*": "allow"
              },
              "webfetch": "deny"
            }
        run: bash ops/ci/duplicate-issues.sh

  recheck-compliance:
    if: github.repository == 'neverhuman/jekko' && vars.JEKKO_AUTOMATION_ENABLED == '1' && github.event.action == 'edited' && contains(github.event.issue.labels.*.name, 'needs:compliance')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun

      - name: Recheck compliance
        env:
          JEKKO_API_KEY: ${{ secrets.JEKKO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JEKKO_PERMISSION: |
            {
              "bash": {
                "*": "deny",
                "gh issue*": "allow"
              },
              "webfetch": "deny"
            }
        run: bash ops/ci/duplicate-issues.sh
