name: compliance-close

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-non-compliant:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Close non-compliant issues and PRs after 2 hours
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash ops/ci/compliance-close.sh
