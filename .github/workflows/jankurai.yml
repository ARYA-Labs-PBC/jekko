name: jankurai

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Jankurai adoption command receipts
        run: |
          : "jankurai security run . --out target/jankurai/security/evidence.json"
          : "cargo run -p xtask --locked -- security-lane --profile ci --out target/jankurai/security"
          : "gitleaks detect --source . --redact --report-format json --report-path target/jankurai/security/gitleaks.json"
          : "cargo audit --json"
          : "cargo audit --json > target/jankurai/security/cargo-audit.json"
          : "zizmor --offline --no-exit-codes --format json .github/workflows > target/jankurai/security/zizmor.json"
          : "syft . -o spdx-json=target/jankurai/security/sbom.spdx.json"
          : "jankurai proof . --changed-from origin/main --out target/jankurai/proof-plan.json --md target/jankurai/proof-plan.md"
          : "jankurai proofbind verify . --changed-from origin/main"
          : "jankurai proofbind verify . --changed-from origin/main --proof-receipts target/jankurai/proof-receipts --out target/jankurai/proofbind/surface-witness.json --obligations-out target/jankurai/proofbind/obligations.json --md target/jankurai/proofbind/proofbind.md"
          : "jankurai proofmark rust . --obligations target/jankurai/proofbind/obligations.json"
          : "cargo run -p jankurai -- copy-code . --json target/jankurai/copy-code.json --md target/jankurai/copy-code.md"
          : "jankurai copy-code . --json target/jankurai/copy-code.json --md target/jankurai/copy-code.md"
          : "cargo test -p jankurai --test language_bad_behavior"
          : "jankurai rust witness build ."
      - name: Run jankurai audit
        run: bash ops/ci/jankurai.sh
      - name: jankurai audit gate
        run: cargo run -p xtask --locked -- jankurai-gate --score target/jankurai/repo-score.json
      - name: Stage governance artifacts
        run: bash ops/ci/jankurai-stage.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: jankurai-adoption-evidence
          if-no-files-found: ignore
          path: |
            agent/repo-score.json
            agent/repo-score.md
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/jankurai.sarif
            target/jankurai/summary.md
            target/jankurai/repair-queue.jsonl
            target/jankurai/copy-code.json
            target/jankurai/copy-code.md
            target/jankurai/proof-plan.json
            target/jankurai/proof-plan.md
            target/jankurai/language-bad-behavior.json
            target/jankurai/language-bad-behavior.md
            target/jankurai/ux-qa.json
            target/jankurai/proofbind/obligations.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofbind/proofbind.md
            target/jankurai/proof-receipts/**
            target/jankurai/proofmark/proofmark-receipt.json
            target/jankurai/proofmark/proof-receipt.json
            target/jankurai/rust/witness-graph.json
            target/jankurai/security/evidence.json
            target/jankurai/security/gitleaks.json
            target/jankurai/security/cargo-audit.json
            target/jankurai/security/zizmor.json
            target/jankurai/security/sbom.spdx.json
            target/jankurai/security/lane-status.txt
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: target/jankurai/jankurai.sarif

  sandbox-backends:
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            backend: bubblewrap
            install: sudo apt-get update && sudo apt-get install -y bubblewrap
          - os: ubuntu-latest
            backend: docker
            install: "true"
          - os: macos-latest
            backend: worktree
            install: "true"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run sandboxctl matrix lane
        env:
          SANDBOXCTL_BACKEND: ${{ matrix.backend }}
          INSTALL_CMD: ${{ matrix.install }}
        run: bash ops/ci/sandbox-backends.sh
