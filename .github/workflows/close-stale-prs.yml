name: close-stale-prs

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Log actions without closing PRs"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: close-stale-prs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-stale-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Close inactive PRs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash ops/ci/close-stale-prs.sh
