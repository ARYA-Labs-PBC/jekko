name: review

on:
  issue_comment:
    types: [created]

concurrency:
  group: review-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check-guidelines:
    if: |
      github.repository == 'neverhuman/jekko' &&
      vars.JEKKO_AUTOMATION_ENABLED == '1' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/review') &&
      contains(fromJson('["OWNER","MEMBER"]'), github.event.comment.author_association)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun

      - name: Check PR guidelines compliance
        env:
          JEKKO_API_KEY: ${{ secrets.JEKKO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JEKKO_PERMISSION: '{ "bash": {  "*": "deny", "gh*": "allow", "gh pr review*": "deny" } }'
        run: bash ops/ci/review.sh
