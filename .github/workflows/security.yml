name: security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Jankurai security lane
        run: bash ops/ci/security.sh

      - name: Secret scanning (trufflehog)
        # Skip on workflow_dispatch: there is no inherent base/head pair to
        # diff against, and TruffleHog refuses to scan when base == head.
        if: github.event_name != 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@ba0a524d6e51744d9d4e306bc57ac5d6ca5173ea # main
        with:
          path: .
          # On pull_request use the PR's actual base/head SHAs.
          # On push use the commits the push moved between (before -> after).
          # The previous config used `base: main, head: HEAD`, which on
          # push:main resolves to the same commit and made TruffleHog error
          # with "BASE and HEAD commits are the same. TruffleHog won't scan".
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.event.after }}
          extra_args: --debug --only-verified

      - name: Dependency scanning (syft + grype)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          artifact-name: sbom
          fail-build: false

      - name: Grype vulnerability scan
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a # v3
        with:
          path: .
          fail-build: false
          severity-cutoff: high
