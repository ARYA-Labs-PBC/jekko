name: pr-standards

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  check-standards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-check-standards
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Check PR standards
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GITHUB_BASE_REF="${{ github.base_ref }}"
          export GITHUB_HEAD_REF="${{ github.head_ref }}"
          export GITHUB_EVENT_PATH="${{ github.event_path }}"
          bash ops/ci/pr-standards.sh

  check-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-check-compliance
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Check PR template compliance
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GITHUB_BASE_REF="${{ github.base_ref }}"
          export GITHUB_HEAD_REF="${{ github.head_ref }}"
          export GITHUB_EVENT_PATH="${{ github.event_path }}"
          bash ops/ci/pr-compliance.sh
