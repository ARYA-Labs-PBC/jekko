name: nix-hashes

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [dev, beta]
    paths:
      - "bun.lock"
      - "package.json"
      - "packages/*/package.json"
      - "flake.lock"
      - "nix/node_modules.nix"
      - "nix/scripts/**"
      - "patches/**"
      - ".github/workflows/nix-hashes.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute-hash:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: blacksmith-4vcpu-ubuntu-2404
          - system: aarch64-linux
            runner: blacksmith-4vcpu-ubuntu-2404-arm
          - system: x86_64-darwin
            runner: macos-15-intel
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035

      - name: Compute node_modules hash
        id: hash
        env:
          SYSTEM: ${{ matrix.system }}
        run: bash ops/ci/nix-hashes-compute.sh

      - name: Upload hash
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hash-${{ matrix.system }}
          path: hash.txt
          retention-days: 1

  update-hashes:
    timeout-minutes: 30
    needs: compute-hash
    if: github.event_name != 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup git committer
        uses: ./.github/actions/setup-git-committer
        with:
          jekko-app-id: ${{ vars.JEKKO_APP_ID }}
          jekko-app-secret: ${{ secrets.JEKKO_APP_SECRET }}

      - name: Download hash artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: hashes
          pattern: hash-*

      - name: Update hashes.json
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: bash ops/ci/nix-hashes-update.sh
