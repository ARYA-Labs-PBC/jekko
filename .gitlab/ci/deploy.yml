# Parity for .github/workflows/deploy.yml.
# GitHub workflow: workflow_dispatch-only, single `noop` job, 30m timeout.

deploy:
  stage: deploy
  image: ubuntu:24.04
  tags: [linux]
  timeout: 30m
  resource_group: "jankurai-deploy-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  before_script:
    - !reference [.os_prep]
  script:
    - bash ops/ci/deploy.sh
  allow_failure: false
