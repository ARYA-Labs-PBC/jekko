# Parity for .github/workflows/jankurai.yml.
# Two jobs:
#   - audit (ubuntu-latest, 30m, full audit + badge refresh + SARIF upload)
#   - sandbox-backends (needs audit, matrix of 3 backends)
# Triggers: PR + push main + dispatch.
# Uses: dtolnay/rust-toolchain, actions/upload-artifact@v7, github/codeql-action/upload-sarif@v4.35.4.

jankurai:audit:
  stage: audit
  extends: .rust_linux_base
  timeout: 30m
  resource_group: "jankurai-audit-$CI_COMMIT_REF_NAME"
  # Manual + allow_failure: optional verification lane. The pre-push hook
  # (`just audit-gate-fast`) already runs the same audit locally; this job
  # is for refreshing the SARIF + badge artifacts on demand. `allow_failure`
  # lets the pipeline reach `success` even when the operator hasn't played
  # this job, which is what `merge_when_pipeline_succeeds` requires.
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  variables:
    # Full clone required by `jankurai proof` (uses changed-from origin/main).
    GIT_DEPTH: "0"
  script:
    - bash ops/ci/jankurai.sh
    - cargo run -p xtask --locked -- jankurai-gate --score .jankurai/repo-score.json
    # Badge check on non-main / PR (parity with GitHub `if: github.event_name != 'push' || github.ref != 'refs/heads/main'`).
    - |
      if [ "$CI_COMMIT_BRANCH" != "main" ] || [ "$CI_PIPELINE_SOURCE" != "push" ]; then
        bash ops/ci/jankurai-badge.sh --check
      fi
    # Badge refresh on main push (parity with GitHub `if: (success()||failure()) && github.event_name == 'push' && github.ref == 'refs/heads/main'`).
    # NOTE: requires git committer creds in GitLab CI vars (JEKKO_APP_ID + JEKKO_APP_SECRET) or a deploy token.
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] && [ "$CI_PIPELINE_SOURCE" = "push" ]; then
        set +e
        bash ops/ci/jankurai-badge.sh
        rc=$?
        set -e
        if git diff --quiet -- README.md agent/jankurai-badge.svg agent/jankurai-badge.json; then
          echo "Badge artifacts up-to-date; nothing to commit."
        else
          if [ -n "${JEKKO_APP_ID:-}" ] && [ -n "${JEKKO_APP_SECRET:-}" ]; then
            bash ops/ci/setup-git-committer.sh
          else
            git config user.name "gitlab-ci-bot"
            git config user.email "ci-bot@$CI_SERVER_HOST"
          fi
          git add README.md agent/jankurai-badge.svg agent/jankurai-badge.json
          git commit -m "chore(jankurai): refresh badge artifacts"
          git push "https://oauth2:${CI_PUSH_TOKEN:-$CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:$CI_COMMIT_BRANCH"
        fi
      fi
    - bash ops/ci/jankurai-stage.sh
  artifacts:
    name: "jankurai-adoption-evidence"
    when: always
    expire_in: 30 days
    paths:
      - ".jankurai/repo-score.json"
      - ".jankurai/repo-score.md"
      - ".jankurai/jankurai.sarif"
      - ".jankurai/summary.md"
      - ".jankurai/repair-queue.jsonl"
      - ".jankurai/copy-code.json"
      - ".jankurai/copy-code.md"
      - ".jankurai/proof-plan.json"
      - ".jankurai/proof-plan.md"
      - ".jankurai/language-bad-behavior.json"
      - ".jankurai/language-bad-behavior.md"
      - ".jankurai/ux-qa.json"
      - ".jankurai/proofbind/"
      - ".jankurai/proof-receipts/"
      - ".jankurai/proofmark/"
      - ".jankurai/rust/witness-graph.json"
      - ".jankurai/security/"
    reports:
      # GitLab equivalent of github/codeql-action/upload-sarif: SARIF is recognised
      # via `reports.sast`. The jankurai.sarif file is uploaded as a SAST report.
      sast:
        - ".jankurai/jankurai.sarif"

jankurai:sandbox-backends:
  stage: audit
  needs:
    - jankurai:audit
  timeout: 20m
  # Same optional-manual semantics as jankurai:audit — see comment above.
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  parallel:
    matrix:
      - SANDBOX_OS: "ubuntu-latest"
        SANDBOXCTL_BACKEND: "bubblewrap"
        INSTALL_CMD: "sudo apt-get update && sudo apt-get install -y bubblewrap"
      - SANDBOX_OS: "ubuntu-latest"
        SANDBOXCTL_BACKEND: "docker"
        INSTALL_CMD: "true"
      - SANDBOX_OS: "macos-latest"
        SANDBOXCTL_BACKEND: "worktree"
        INSTALL_CMD: "true"
    # NOTE: SANDBOX_OS=macos-latest matrix row currently runs the early-exit
    # short-circuit below — no real macOS runner is registered in jeryu. To
    # exercise the worktree backend on macOS, register a runner with a
    # `macos` tag and rewrite this row to use `tags: [macos]`.
  variables:
    GIT_DEPTH: "0"
  before_script:
    - if [ "$SANDBOX_OS" = "macos-latest" ]; then echo "macos-latest sandbox row skipped on linux runner"; exit 0; fi
    - !reference [.rust_setup]
    - eval "$INSTALL_CMD"
  script:
    - bash ops/ci/sandbox-backends.sh
