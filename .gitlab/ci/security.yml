# Parity for .github/workflows/security.yml.
# GitHub job: scan (ubuntu-latest, 30m) — 4 third-party actions:
#   - trufflesecurity/trufflehog@main (skipped on workflow_dispatch)
#   - anchore/sbom-action@v0.24.0
#   - anchore/scan-action@v3
# All require git history; GIT_DEPTH=0 below.

security:scan:
  stage: test
  extends: .rust_linux_base
  timeout: 30m
  resource_group: "security-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
  variables:
    GIT_DEPTH: "0"
  script:
    - bash ops/ci/security.sh
    # ---- trufflesecurity/trufflehog@main equivalent ----
    # Skipped on workflow_dispatch (parity with GitHub `if: !workflow_dispatch`).
    - |
      if [ "$CI_PIPELINE_SOURCE" != "web" ] && [ "$CI_PIPELINE_SOURCE" != "api" ]; then
        if ! command -v trufflehog >/dev/null 2>&1; then
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
        fi
        BASE_REF="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-${CI_COMMIT_BEFORE_SHA:-HEAD~1}}"
        HEAD_REF="${CI_COMMIT_SHA:-HEAD}"
        trufflehog filesystem . --json --no-update | tee trufflehog-report.json
      fi
    # ---- anchore/sbom-action@v0.24.0 equivalent (syft SBOM) ----
    - |
      if ! command -v syft >/dev/null 2>&1; then
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      fi
      syft . -o spdx-json=sbom.spdx.json || true
    # ---- anchore/scan-action@v3 equivalent (grype) ----
    - |
      if ! command -v grype >/dev/null 2>&1; then
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      fi
      grype sbom:./sbom.spdx.json --fail-on high || true
  artifacts:
    name: "security-${CI_JOB_ID}"
    when: always
    expire_in: 30 days
    paths:
      - "sbom.spdx.json"
      - "trufflehog-report.json"
