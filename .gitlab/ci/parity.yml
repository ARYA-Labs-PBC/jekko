# Parity for .github/workflows/parity.yml (load-bearing rust gates)
# Jobs: rust-parity-gates (clippy+rustfmt + parity.sh), guard-advisory.
# Triggers: push dev/main + PR + dispatch.
# Env: CARGO_TERM_COLOR=always, RUSTFLAGS=-D warnings.

parity:rust-parity-gates:
  stage: test
  extends: .rust_linux_base_full
  timeout: 45m
  resource_group: "parity-rust-$CI_COMMIT_REF_NAME"
  rules:
    # Auto-fire on MR events — verified clean in pipeline #585 (418s wall).
    # This is what gates auto-merge: MR can't merge until parity is green.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Stay manual on direct push (rare; the MR pipeline already verified).
    - if: ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev") && $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  variables:
    CARGO_TERM_COLOR: "always"
    RUSTFLAGS: "-D warnings"
  script:
    - bash ops/ci/parity.sh
  artifacts:
    name: "openapi-snapshot-and-binary"
    when: always
    expire_in: 30 days
    paths:
      - "docs/openapi-snapshot.json"
      - "target/release/jekko"

parity:guard-advisory:
  stage: test
  extends: .rust_linux_base
  timeout: 30m
  resource_group: "parity-guard-$CI_COMMIT_REF_NAME"
  rules:
    # Auto-fire — cargo-lock contention is resolved (per-job CARGO_HOME +
    # unset RUSTC_WRAPPER). Light clippy/guard checks, fast on warm cache.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev") && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  variables:
    CARGO_TERM_COLOR: "always"
    RUSTFLAGS: "-D warnings"
  script:
    - bash ops/ci/guard-advisory.sh
