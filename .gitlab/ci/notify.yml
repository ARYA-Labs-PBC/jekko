# Parity for .github/workflows/notify-discord.yml.
# GitHub workflow: on release (types: released) — fires only when a release is
# published. GitLab equivalent is tag-pipeline + a Release object; we run on
# tag pipelines that match a semver-like tag (override via $RELEASE_TAG_REGEX).

notify-discord:
  stage: deploy
  image: ubuntu:24.04
  tags: [blacksmith]
  timeout: 10m
  resource_group: "notify-discord-$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  variables:
    DISCORD_WEBHOOK: "${DISCORD_WEBHOOK}"
  before_script:
    - !reference [.os_prep]
  script:
    - bash ops/ci/notify-discord.sh
