# Parity for:
#   .github/workflows/typecheck.yml         (1 job, triggers: push main/dev + PR)
#   .github/workflows/check-encrypted-paths.yml (1 job, triggers: push main/dev + PR)

# ---- typecheck.yml -----------------------------------------------------

typecheck:
  stage: static
  extends: .rust_linux_base
  timeout: 10m
  resource_group: "typecheck-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*"
    - if: ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev") && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
  script:
    - bash ops/ci/typecheck.sh

# ---- check-encrypted-paths.yml ----------------------------------------

check-encrypted-paths:
  stage: static
  timeout: 10m
  resource_group: "check-encrypted-paths-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev") && $CI_PIPELINE_SOURCE == "push"
  variables:
    # GitHub workflow had FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true (composite-actions hint).
    # GitLab has no JS actions; we just preserve the env var in case ops/ci/check-encrypted-paths.sh reads it.
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends bash git ca-certificates
  script:
    - bash ops/ci/check-encrypted-paths.sh
