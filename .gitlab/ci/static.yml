# Parity for:
#   .github/workflows/typecheck.yml         (1 job, triggers: push main/dev + PR)
#   .github/workflows/check-encrypted-paths.yml (1 job, triggers: push main/dev + PR)

# ---- typecheck (split into 3 parallel lanes for jeryu's 3 runners) ----
#
# The original GitHub workflow's `typecheck` ran a single
# `cargo check --workspace --locked`. On jeryu's 3 online runners
# (jeryu-default + jeryu-build + jeryu-untrusted, all run_untagged=true),
# that fits exactly into 3 parallel lanes — each targeting a different
# subtree of the workspace. The combined wall-clock is bounded by the
# slowest lane (jekko-cli, which drags in the most deps), so this cuts
# typecheck from ~10 min serial to ~5-7 min wall.
#
# Lane allocation chosen so each lane's transitive dep graph is roughly
# balanced. cargo deduplicates per-runner via the shared cargo cache
# (.cargo/registry/{index,cache} + target/) keyed on Cargo.lock.

typecheck:
  stage: static
  extends: .rust_linux_base
  timeout: 30m
  parallel:
    matrix:
      - LANE: "jekko-cli"        # pulls jekko-* runtime + tui + server
      - LANE: "jankurai-runner"  # pulls jankurai + agent-search + reasoning
      - LANE: "zyal-supervisor"  # pulls zyal-* + zyalc
  resource_group: "typecheck-${LANE}-$CI_COMMIT_REF_NAME"
  rules:
    # Auto-fire — the original blockers (cargo registry-lock contention,
    # sccache port collisions) are resolved by per-job CARGO_HOME isolation
    # in `.rust_setup` plus `unset RUSTC_WRAPPER`. Verified 93s wall clock
    # per lane in pipeline #543 (job 3824). With jeryu's 3 runners + the
    # 3-lane parallel matrix, the whole typecheck completes in ~90-120s
    # wall.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev") && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  script:
    - cargo check -p "$LANE" --locked --tests

# ---- check-encrypted-paths.yml ----------------------------------------

check-encrypted-paths:
  stage: static
  timeout: 15m
  resource_group: "check-encrypted-paths-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev") && $CI_PIPELINE_SOURCE == "push"
  variables:
    # GitHub workflow had FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true (composite-actions hint).
    # GitLab has no JS actions; we just preserve the env var in case ops/ci/check-encrypted-paths.sh reads it.
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends bash git ca-certificates
  script:
    - bash ops/ci/check-encrypted-paths.sh
