# Parity for .github/workflows/generate.yml.
# GitHub workflow: name=generate, runs-on=blacksmith-4vcpu-ubuntu-2404, on push dev only.
# Uses: dtolnay/rust-toolchain + setup-git-committer composite (JEKKO_APP_ID + JEKKO_APP_SECRET).

generate:
  stage: generate
  extends: .rust_blacksmith_base
  timeout: 30m
  resource_group: "generate-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"
  variables:
    GIT_DEPTH: "0"
  before_script:
    - !reference [.rust_setup]
    - !reference [.git_committer]
  script:
    - bash ops/ci/generate.sh
