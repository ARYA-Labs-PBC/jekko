# Parity for:
#   .github/workflows/nix-eval.yml — 1 job (push dev + PR dev + dispatch)
#   .github/workflows/nix-hashes.yml — 2 jobs (compute-hash matrix on 4 systems + update-hashes)
# Uses: nixbuild/nix-quick-install-action@v34.

# ---------- nix-eval.yml -----------------------------------------------

nix-eval:
  stage: test
  timeout: 15m
  resource_group: "nix-eval-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"
    - if: $CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
  before_script:
    - !reference [.os_prep]
    # nixbuild/nix-quick-install-action@v34 equivalent
    - |
      if ! command -v nix >/dev/null 2>&1; then
        curl -sSfL https://install.determinate.systems/nix | sh -s -- install --no-confirm
      fi
    - . /etc/profile.d/nix.sh || . $HOME/.nix-profile/etc/profile.d/nix.sh || true
    - nix --version
  script:
    - bash ops/ci/nix-eval.sh

# ---------- nix-hashes.yml — compute-hash matrix ----------------------

.nix_hashes_compute_base:
  stage: test
  timeout: 60m
  before_script:
    - !reference [.os_prep]
    - |
      if ! command -v nix >/dev/null 2>&1; then
        curl -sSfL https://install.determinate.systems/nix | sh -s -- install --no-confirm
      fi
    - . /etc/profile.d/nix.sh || . $HOME/.nix-profile/etc/profile.d/nix.sh || true
    - nix --version
  script:
    - bash ops/ci/nix-hashes-compute.sh
  artifacts:
    name: "hash-${SYSTEM}-${CI_JOB_ID}"
    expire_in: 1 day
    paths:
      - hash.txt

nix-hashes:compute:linux-x64:
  extends: .nix_hashes_compute_base
  variables:
    SYSTEM: "x86_64-linux"
  rules: &nix_hashes_compute_rules
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
    - if: ($CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "beta") && $CI_PIPELINE_SOURCE == "push"
      changes:
        - "flake.lock"
        - "nix/node_modules.nix"
        - "nix/scripts/**"
        - "patches/**"
        - ".gitlab/ci/nix.yml"

nix-hashes:compute:linux-arm:
  extends: .nix_hashes_compute_base
  variables:
    SYSTEM: "aarch64-linux"
  rules: *nix_hashes_compute_rules

nix-hashes:compute:macos-intel:
  extends: .nix_hashes_compute_base
  variables:
    SYSTEM: "x86_64-darwin"
  rules: *nix_hashes_compute_rules

nix-hashes:compute:macos-arm:
  extends: .nix_hashes_compute_base
  variables:
    SYSTEM: "aarch64-darwin"
  rules: *nix_hashes_compute_rules

# ---------- nix-hashes.yml — update-hashes (downloads all 4 artifacts) -

nix-hashes:update:
  stage: deploy
  timeout: 30m
  resource_group: "nix-hashes-update-$CI_COMMIT_REF_NAME"
  rules:
    # Only on push to dev/beta or manual; matches GitHub `if: github.event_name != 'pull_request'`.
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
    - if: ($CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "beta") && $CI_PIPELINE_SOURCE == "push"
  needs:
    - job: nix-hashes:compute:linux-x64
      artifacts: true
    - job: nix-hashes:compute:linux-arm
      artifacts: true
    - job: nix-hashes:compute:macos-intel
      artifacts: true
    - job: nix-hashes:compute:macos-arm
      artifacts: true
  variables:
    GIT_DEPTH: "0"
    GITHUB_REF_NAME: "${CI_COMMIT_BRANCH}"
    GITHUB_STEP_SUMMARY: "${CI_PROJECT_DIR}/.gitlab-step-summary.md"
  before_script:
    - !reference [.os_prep]
    - !reference [.git_committer]
  script:
    # The compute jobs all upload to "hash.txt" — GitLab places them under
    # the job names. We reproduce the GitHub `actions/download-artifact pattern: hash-*`
    # by gathering each artifact into a per-system directory.
    - mkdir -p hashes
    - cp hash.txt "hashes/hash-x86_64-linux.txt" 2>/dev/null || true
    - bash ops/ci/nix-hashes-update.sh
  artifacts:
    name: "nix-hashes-summary-${CI_JOB_ID}"
    when: always
    expire_in: 7 days
    paths:
      - ".gitlab-step-summary.md"
      - "hashes/"
