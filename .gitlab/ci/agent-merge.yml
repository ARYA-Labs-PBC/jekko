# agent-merge: VibeGate Evidence-Gate auto-merge.
#
# After every other lane in the pipeline succeeds on a merge-request
# pipeline, this job runs reviewer roles against the diff (via OpenRouter
# using the project's `OPENROUTER_API_KEY` CI variable) and — if no
# reviewer returns `block` — calls the GitLab merge API directly to land
# the MR. The actual logic lives in `ops/ci/agent-merge.sh` so it can be
# tested locally.
#
# CI variables required (set at project level):
#   OPENROUTER_API_KEY (masked) — auth for openrouter.ai
#   GITLAB_PAT         (masked) — auth for the GitLab MR merge endpoint
#
# This lane is the LAST stage before `github-sync:push-to-main` (which
# only fires on $CI_COMMIT_BRANCH == "main" after the merge lands).
#
# Reviewer prompts live in `.autonomy/prompts/reviewer-<role>.md` and
# instruct the model to emit a JSON AgentApprovalReceipt (schema
# vibegate.agent_approval_receipt.v1). Receipts are uploaded as artifacts.

agent-merge:autonomy-review-and-merge:
  stage: deploy
  # Alpine for fast cold-start + apk avoids the debian ca-certificates
  # post-install bug we hit on pipeline 995 (overlay FS locks the cert
  # store mid-update). All endpoints are HTTP-only (jeryu localhost,
  # fusion docker bridge) so we don't need a CA bundle anyway.
  image: alpine:3.20
  timeout: 15m
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
      when: on_success
    - when: never
  needs:
    - job: parity:cargo-test
      optional: true
    - job: parity:build-gates
      optional: true
    - job: parity:fmt-clippy
      optional: true
    - job: parity:guard-advisory
      optional: true
    - job: security:rust-tools
      optional: true
    - job: security:syft-grype
      optional: true
    - job: security:trufflehog
      optional: true
    - job: test:tui
      optional: true
    - job: test:unit
      optional: true
    - job: typecheck
      optional: true
    - job: check-encrypted-paths
      optional: true
  variables:
    # Need full history for `git diff main...HEAD`. Workflow default
    # GIT_DEPTH=20 doesn't include the merge base.
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache bash curl git jq python3
    # Make `origin/main` available for the diff base.
    - git fetch --depth=1 origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
  script:
    - bash ops/ci/agent-merge.sh
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - .autonomy/.receipts/
  allow_failure: false
