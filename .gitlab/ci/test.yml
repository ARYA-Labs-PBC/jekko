# Parity for .github/workflows/test.yml — load-bearing test lane.
#
# GitHub workflow: name=test, 5-job spec (matrix); on push dev + PR + dispatch.
# - unit (matrix.settings.name=linux on ubuntu-latest) — runs ops/ci/test-unit.sh,
#   publishes JUnit via mikepenz/action-junit-report, uploads packages/*/.artifacts/unit/junit.xml.
# - tui (ubuntu-latest) — runs ops/ci/test-tui.sh, uploads target/tuiwright-jekko/**.

test:unit:
  stage: test
  extends: .rust_linux_base
  timeout: 60m
  parallel:
    matrix:
      - SETTINGS_NAME: ["linux"]
  # No resource_group: per-job CARGO_HOME isolation prevents the registry-lock
  # contention this used to serialize; the orphan-lock liveness issue is real.
  rules:
    # Auto-fire on MR — `cargo test --workspace` covers the same surface as
    # parity.sh's test step but produces JUnit artifacts. Gates auto-merge.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  variables:
    # GitHub-workflow env: JEKKO_EXPERIMENTAL_DISABLE_FILEWATCHER for Windows runners only.
    # On linux runners the GitHub expression resolves to 'false' — we preserve that here.
    JEKKO_EXPERIMENTAL_DISABLE_FILEWATCHER: "false"
  script:
    - bash ops/ci/test-unit.sh
  artifacts:
    name: "unit-${SETTINGS_NAME}-${CI_JOB_ID}"
    when: always
    expire_in: 7 days
    paths:
      - "packages/*/.artifacts/unit/junit.xml"
    reports:
      junit: "packages/*/.artifacts/unit/junit.xml"
  allow_failure: false

test:tui:
  stage: test
  extends: .rust_linux_base
  timeout: 60m
  # No resource_group — see test:unit comment.
  rules:
    # Auto-fire on MR — covers unique TUI baseline + tuiwright tests that
    # parity.sh doesn't run. Gates auto-merge.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
      when: manual
  script:
    - bash ops/ci/test-tui.sh
  artifacts:
    name: "tui-${CI_JOB_ID}"
    when: always
    expire_in: 7 days
    paths:
      - "target/tuiwright-jekko/**"
