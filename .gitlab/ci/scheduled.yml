# Parity for the scheduled/housekeeping workflows:
#   close-issues.yml         — daily at 02:00 UTC
#   close-stale-prs.yml      — daily at 06:00 UTC
#   compliance-close.yml     — every 30 minutes
#   stats.yml                — daily at 12:00 UTC (gated on JEKKO_AUTOMATION_ENABLED=1)
#
# In GitLab, cron schedules are NOT in YAML — they're configured under
# Settings → CI/CD → Schedules with a per-schedule variable set. We expose a
# `SCHEDULED_JOB` variable to select which housekeeping task runs:
#
#   SCHEDULED_JOB=close-issues
#   SCHEDULED_JOB=close-stale-prs
#   SCHEDULED_JOB=compliance-close
#   SCHEDULED_JOB=stats
#
# The matching cron strings to configure (UTC):
#   close-issues      → 0 2 * * *
#   close-stale-prs   → 0 6 * * *
#   compliance-close  → */30 * * * *
#   stats             → 0 12 * * *

scheduled:close-issues:
  stage: scheduled
  image: ubuntu:24.04
  tags: [linux]
  timeout: 15m
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "close-issues"
    - if: ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && $SCHEDULED_JOB == "close-issues"
      when: manual
  variables:
    GITHUB_TOKEN: "${GITHUB_TOKEN}"
  before_script:
    - !reference [.os_prep]
    - apt-get install -y -qq --no-install-recommends gh
  script:
    - bash ops/ci/close-issues.sh

scheduled:close-stale-prs:
  stage: scheduled
  image: ubuntu:24.04
  tags: [linux]
  timeout: 15m
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "close-stale-prs"
    - if: ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && $SCHEDULED_JOB == "close-stale-prs"
      when: manual
  variables:
    GITHUB_TOKEN: "${GITHUB_TOKEN}"
    DRY_RUN: "${dryRun:-false}"
  before_script:
    - !reference [.os_prep]
    - apt-get install -y -qq --no-install-recommends gh
  script:
    - bash ops/ci/close-stale-prs.sh

scheduled:compliance-close:
  stage: scheduled
  image: ubuntu:24.04
  tags: [linux]
  timeout: 15m
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "compliance-close"
    - if: ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && $SCHEDULED_JOB == "compliance-close"
      when: manual
  variables:
    GITHUB_TOKEN: "${GITHUB_TOKEN}"
  before_script:
    - !reference [.os_prep]
    - apt-get install -y -qq --no-install-recommends gh
  script:
    - bash ops/ci/compliance-close.sh

scheduled:stats:
  stage: scheduled
  extends: .rust_blacksmith_base
  timeout: 30m
  rules:
    # Parity with GitHub `if: github.repository == 'neverhuman/jekko' && vars.JEKKO_AUTOMATION_ENABLED == '1'`.
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "stats" && $CI_PROJECT_PATH == "neverhuman/jekko" && $JEKKO_AUTOMATION_ENABLED == "1"
    - if: ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && $SCHEDULED_JOB == "stats"
      when: manual
  variables:
    GIT_DEPTH: "0"
  before_script:
    - !reference [.rust_setup]
    - !reference [.git_committer]
  script:
    - bash ops/ci/stats.sh
