# Parity for .github/workflows/pr-standards.yml.
# GitHub uses `pull_request_target` (runs in base-repo permission context).
# GitLab has no direct equivalent; merge_request_event jobs already run in
# the target project's context, so the security model maps cleanly.
# Jobs: check-standards, check-compliance — both run ops/ci/pr-policy.sh
# with different positional args.

pr-standards:check-standards:
  stage: static
  extends: .rust_linux_base
  timeout: 30m
  resource_group: "pr-standards-check-standards-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  variables:
    GH_TOKEN: "${CI_JOB_TOKEN}"
    GITHUB_TOKEN: "${CI_JOB_TOKEN}"
    GH_REPO: "${CI_PROJECT_PATH}"
    GITHUB_REPOSITORY: "${CI_PROJECT_PATH}"
    GITHUB_BASE_REF: "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    GITHUB_HEAD_REF: "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
    GITHUB_EVENT_PATH: "${CI_PROJECT_DIR}/.gitlab-event.json"
  before_script:
    - !reference [.rust_setup]
    # Synthesise a minimal `event.json` that ops/ci/pr-policy.sh can consume in
    # GitLab as it would from GitHub's $GITHUB_EVENT_PATH.
    - |
      cat > "$GITHUB_EVENT_PATH" <<JSON
      {
        "action": "synchronize",
        "pull_request": {
          "number": ${CI_MERGE_REQUEST_IID:-0},
          "title": "${CI_MERGE_REQUEST_TITLE:-}",
          "body": "",
          "base": { "ref": "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}" },
          "head": { "ref": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}" }
        }
      }
      JSON
  script:
    - bash ops/ci/pr-policy.sh standards

pr-standards:check-compliance:
  stage: static
  extends: .rust_linux_base
  timeout: 30m
  resource_group: "pr-standards-check-compliance-$CI_COMMIT_REF_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  variables:
    GH_TOKEN: "${CI_JOB_TOKEN}"
    GITHUB_TOKEN: "${CI_JOB_TOKEN}"
    GH_REPO: "${CI_PROJECT_PATH}"
    GITHUB_REPOSITORY: "${CI_PROJECT_PATH}"
    GITHUB_BASE_REF: "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    GITHUB_HEAD_REF: "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
    GITHUB_EVENT_PATH: "${CI_PROJECT_DIR}/.gitlab-event.json"
  before_script:
    - !reference [.rust_setup]
    - |
      cat > "$GITHUB_EVENT_PATH" <<JSON
      {
        "action": "synchronize",
        "pull_request": {
          "number": ${CI_MERGE_REQUEST_IID:-0},
          "title": "${CI_MERGE_REQUEST_TITLE:-}",
          "body": "",
          "base": { "ref": "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}" },
          "head": { "ref": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}" }
        }
      }
      JSON
  script:
    - bash ops/ci/pr-policy.sh compliance
