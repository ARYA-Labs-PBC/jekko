# Parity for .github/workflows/pr-standards.yml.
# GitHub uses `pull_request_target` (runs in base-repo permission context).
# GitLab has no direct equivalent; merge_request_event jobs already run in
# the target project's context, so the security model maps cleanly.
# Jobs: check-standards, check-compliance — both run ops/ci/pr-policy.sh
# with different positional args.

pr-standards:check-standards:
  stage: static
  extends: .rust_linux_base
  timeout: 30m
  # No resource_group — per-job CARGO_HOME isolation + orphan-lock liveness.
  rules:
    # Auto-fire on MR events — lightweight policy check (PR title, body
    # conventions); manual was blocking stage progression to test stage.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # allow_failure: the xtask `pr-standards` is GitHub-Actions-shaped and
  # consumes a webhook event.json with fields (pull_request.author.login,
  # pull_request.user, etc.) that GitLab MR pipelines don't natively
  # populate. The synthesised event.json under GITHUB_EVENT_PATH covers the
  # token/repo/refs contract but not the full author + reviewer payload.
  # FOLLOW-UP: write a complete GitLab→GitHub event-shim in xtask or skip
  # this job entirely on GitLab (the policy checks have GitLab-native
  # equivalents via push rules + branch protections).
  allow_failure: true
  variables:
    GH_REPO: "${CI_PROJECT_PATH}"
    GITHUB_REPOSITORY: "${CI_PROJECT_PATH}"
    GITHUB_BASE_REF: "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    GITHUB_HEAD_REF: "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
    GITHUB_EVENT_PATH: "${CI_PROJECT_DIR}/.gitlab-event.json"
    # The xtask `pr-standards` reads `GITHUB_EVENT_NAME` to know what
    # webhook payload to expect. GitLab MR pipelines map to GitHub's
    # `pull_request` event for policy purposes.
    GITHUB_EVENT_NAME: "pull_request"
  before_script:
    - !reference [.rust_setup]
    # Force GH_TOKEN == GITHUB_TOKEN in the shell env. The YAML
    # `variables:` block doesn't reliably override the project-level
    # GITHUB_TOKEN secret (set for github-sync) — `unset` it, then set
    # both to $CI_JOB_TOKEN so `require_pr_policy_contract` is satisfied.
    - unset GITHUB_TOKEN
    - export GH_TOKEN="${CI_JOB_TOKEN}"
    - export GITHUB_TOKEN="${CI_JOB_TOKEN}"
    # Synthesise a minimal `event.json` that ops/ci/pr-policy.sh can consume in
    # GitLab as it would from GitHub's $GITHUB_EVENT_PATH.
    - |
      cat > "$GITHUB_EVENT_PATH" <<JSON
      {
        "action": "synchronize",
        "pull_request": {
          "number": ${CI_MERGE_REQUEST_IID:-0},
          "title": "${CI_MERGE_REQUEST_TITLE:-}",
          "body": "",
          "base": { "ref": "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}" },
          "head": { "ref": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}" }
        }
      }
      JSON
  script:
    - bash ops/ci/pr-policy.sh standards

pr-standards:check-compliance:
  stage: static
  extends: .rust_linux_base
  timeout: 30m
  # No resource_group — per-job CARGO_HOME isolation + orphan-lock liveness.
  rules:
    # Auto-fire on MR events — lightweight compliance check; manual was
    # blocking stage progression.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # allow_failure: same GitHub-event-shape mismatch as check-standards above.
  allow_failure: true
  variables:
    GH_REPO: "${CI_PROJECT_PATH}"
    GITHUB_REPOSITORY: "${CI_PROJECT_PATH}"
    GITHUB_BASE_REF: "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    GITHUB_HEAD_REF: "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
    GITHUB_EVENT_PATH: "${CI_PROJECT_DIR}/.gitlab-event.json"
    # The xtask `pr-standards` reads `GITHUB_EVENT_NAME` to know what
    # webhook payload to expect. GitLab MR pipelines map to GitHub's
    # `pull_request` event for policy purposes.
    GITHUB_EVENT_NAME: "pull_request"
  before_script:
    - !reference [.rust_setup]
    # Same GITHUB_TOKEN override as pr-standards:check-standards above.
    - unset GITHUB_TOKEN
    - export GH_TOKEN="${CI_JOB_TOKEN}"
    - export GITHUB_TOKEN="${CI_JOB_TOKEN}"
    - |
      cat > "$GITHUB_EVENT_PATH" <<JSON
      {
        "action": "synchronize",
        "pull_request": {
          "number": ${CI_MERGE_REQUEST_IID:-0},
          "title": "${CI_MERGE_REQUEST_TITLE:-}",
          "body": "",
          "base": { "ref": "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}" },
          "head": { "ref": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}" }
        }
      }
      JSON
  script:
    - bash ops/ci/pr-policy.sh compliance
