# Direct sync: jeryu main → GitHub main.
#
# Runs after every merge into jeryu's `main` branch. The job pushes the
# merged-main HEAD directly to `github.com/neverhuman/jekko:main`. No PR
# layer — branch protection / rulesets are off on the GitHub side, so
# direct-to-main push is the canonical (and simplest) mirror strategy.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   GITHUB_TOKEN  — fine-grained or classic PAT with `repo` + `workflow`
#                   scopes on `neverhuman/jekko`. gh / git pick this up
#                   from the env automatically.
#
# Skip with: `git push -o ci.variable="SKIP_GITHUB_SYNC=1"` to bypass.

github-sync:push-to-main:
  stage: deploy
  image: ubuntu:24.04
  timeout: 10m
  resource_group: "github-sync-$CI_COMMIT_REF_NAME"
  # Bypass the stage gate via `needs:` — GitLab 17 treats `when: manual`
  # jobs in earlier stages as blockers by default, and the rest of the
  # pipeline's lanes (typecheck:*, parity:*, security:scan, jankurai:*)
  # are all manual-only on push to main. With `needs:` we only wait for
  # the single auto-gate (`check-encrypted-paths`) and fire as soon as
  # it succeeds — no need to click Play on the heavy lanes.
  needs:
    - job: check-encrypted-paths
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push" && $SKIP_GITHUB_SYNC != "1"
  variables:
    GIT_DEPTH: "0"
  before_script:
    - |
      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "GITHUB_TOKEN must be set in CI/CD vars for github-sync to push" >&2
        exit 78  # neutral; allow_failure: true means this won't fail the pipeline
      fi
    - export DEBIAN_FRONTEND=noninteractive
    # Install git + curl + ca-certificates if missing (ubuntu:24.04 is minimal).
    # Pipe-filter the ca-certificates dpkg-postinst noise (bind-mount conflict
    # on /etc/ssl/certs/ca-certificates.crt observed in pipeline #521).
    - |
      missing=""
      for c in git curl; do
        command -v "$c" >/dev/null 2>&1 || missing="$missing $c"
      done
      if [ -n "$missing" ]; then
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends $missing ca-certificates 2>&1 \
          | grep -vE "ca-certificates.*Device or resource busy|Errors were encountered|Sub-process" || true
      fi
  script:
    - |
      set -euo pipefail
      SHORT_SHA=$(git rev-parse --short HEAD)
      UTC_DATE=$(date -u +%Y%m%d)
      echo "Pushing $CI_COMMIT_SHA ($SHORT_SHA) to github.com/neverhuman/jekko:main"

      # Add github remote on the fly (GitLab Runner builds dir is fresh).
      # Token in the URL is fine for the lifetime of the push — it's masked
      # by GitLab's log scrubber.
      git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/neverhuman/jekko.git" 2>/dev/null \
        || git remote set-url github "https://x-access-token:${GITHUB_TOKEN}@github.com/neverhuman/jekko.git"

      # Fetch current github main so --force-with-lease has a real expected SHA.
      git fetch github main
      EXPECTED_GH=$(git rev-parse github/main)
      echo "github/main expected at $EXPECTED_GH; pushing $CI_COMMIT_SHA"

      # Force-with-lease: succeeds only if github/main is still where our fetch
      # saw it. If a concurrent push beat us, we abort cleanly and rerun.
      git push --force-with-lease="main:$EXPECTED_GH" github "HEAD:refs/heads/main"

      echo "github/main now at $CI_COMMIT_SHA ($UTC_DATE / $SHORT_SHA)"
  allow_failure: true  # don't block the pipeline if the GitHub push fails
