[extend]
useDefault = true

[[allowlists]]
description = "local ignored provider env files are not source artifacts"
paths = [
  '''(^|/)\.env\.jnoccio$''',
]

[[allowlists]]
description = "generated build and audit artifacts are not source artifacts"
paths = [
  '''^target/''',
]

[[allowlists]]
description = "privacy scanner test uses a synthetic marker"
condition = "AND"
regexTarget = "match"
paths = [
  '''^crates/memory-benchmark/tests/privacy_transform\.rs$''',
]
regexes = [
  '''PRIVATE-1234''',
]
