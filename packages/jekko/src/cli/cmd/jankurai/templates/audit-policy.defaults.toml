# Default jankurai audit policy. Generated by `jekko jankurai bootstrap`.
# Hand-edit freely; the bootstrap is idempotent and never overwrites existing keys.

[decision]
# Minimum score to keep the audit decision green.
min_score = 85
# Severities that fail the gate (CI blocks merge).
fail_on = ["critical", "high"]
# Severities that emit warnings but do not block the gate.
advisory_on = ["medium", "low"]

[scan]
# Directories never scanned. Generated zones are tracked separately in
# `.jekko/agent/generated-zones.toml`.
exclude = [
  "node_modules/**",
  "target/**",
  "dist/**",
  ".jekko/**",
  ".zyal/**",
]
